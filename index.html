<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ficha SINAN - Violência Interpessoal / Autoprovocada</title>
<link rel="stylesheet" href="styles.css">
<script defer src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script defer src="app.js"></script>
</head>
<body>

<!-- Topbar -->
<header class="topbar no-print">
  <div class="topbar-info">
    <h1>Ficha SINAN editável</h1>
    <p>Modelo web baseado no PDF. Preencha e exporte em PDF.</p>
  </div>
  <div class="topbar-actions">
    <button id="fillSampleBtn" type="button">Preencher exemplo</button>
    <button id="clearBtn" type="button" class="secondary">Limpar</button>
    <button id="exportBtn" type="button" class="primary">Exportar PDF</button>
  </div>
</header>

<main>
<div id="document" class="document">
  <section class="page">

    <!-- Cabeçalho -->
    <div class="form-header">
      <div class="logo-box">
        <img src="img/logo-prefeitura.png" alt="Logo Prefeitura" class="logo-orgao">
      </div>
      <div class="header-main">
        <div class="title">FICHA DE NOTIFICAÇÃO INDIVIDUAL</div>
        <div class="subtitle">VIOLÊNCIA INTERPESSOAL / AUTOPROVOCADA</div>
      </div>
      <div class="header-right">
        <strong>SINAN</strong>
        <span>Sistema de Informação de Agravos de Notificação</span>
      </div>
    </div>

    <!-- DADOS GERAIS -->
    <section class="form-block">
      <h2>Dados Gerais</h2>
      <div class="grid-3cols">
        <div>
          <label>Tipo de Notificação</label>
          <input type="text">
        </div>
        <div>
          <label>Agravos / Doença</label>
          <input type="text">
        </div>
        <div>
          <label>Código CID-10</label>
          <input type="text">
        </div>
      </div>
      <div class="grid-3cols">
        <div>
          <label>Data da Notificação</label>
          <input type="date">
        </div>
        <div>
          <label>UF</label>
          <input type="text">
        </div>
        <div>
          <label>Município</label>
          <input type="text">
        </div>
      </div>
      <div class="grid-2cols">
        <div>
          <label>Código IBGE</label>
          <input type="text">
        </div>
        <div>
          <label>Unidade Notificadora</label>
          <input type="text">
        </div>
      </div>
    </section>

    <!-- NOTIFICAÇÃO INDIVIDUAL -->
    <section class="form-block">
      <h2>Notificação Individual</h2>
      <div class="grid-4cols">
        <div>
          <label>Nome do Paciente</label>
          <input type="text">
        </div>
        <div>
          <label>Data de Nascimento</label>
          <input type="date">
        </div>
        <div>
          <label>Idade</label>
          <input type="number">
        </div>
        <div>
          <label>Tipo</label>
          <input type="text">
        </div>
      </div>
      <div class="grid-4cols">
        <div>
          <label>Sexo</label>
          <select>
            <option value="">Selecione</option>
            <option value="Feminino">Feminino</option>
            <option value="Masculino">Masculino</option>
          </select>
        </div>
        <div>
          <label>Gestante</label>
          <select>
            <option value="">Selecione</option>
            <option value="Não">Não</option>
            <option value="Sim">Sim</option>
          </select>
        </div>
        <div>
          <label>Raça / Cor</label>
          <input type="text">
        </div>
        <div>
          <label>Escolaridade</label>
          <input type="text">
        </div>
      </div>
      <div class="grid-2cols">
        <div>
          <label>Número do Cartão SUS</label>
          <input type="text">
        </div>
        <div>
          <label>Nome da Mãe</label>
          <input type="text">
        </div>
      </div>
    </section>

    <!-- DADOS DA RESIDÊNCIA -->
    <section class="form-block">
      <h2>Dados da Residência</h2>
      <div class="grid-3cols">
        <div>
          <label>UF</label>
          <input type="text">
        </div>
        <div>
          <label>Município</label>
          <input type="text">
        </div>
        <div>
          <label>Código IBGE</label>
          <input type="text">
        </div>
      </div>
      <div class="grid-4cols">
        <div>
          <label>Distrito</label>
          <input type="text">
        </div>
        <div>
          <label>Bairro</label>
          <input type="text">
        </div>
        <div>
          <label>Logradouro</label>
          <input type="text">
        </div>
        <div>
          <label>Número</label>
          <input type="text">
        </div>
      </div>
      <div class="grid-3cols">
        <div>
          <label>Complemento</label>
          <input type="text">
        </div>
        <div>
          <label>Ponto de referência</label>
          <input type="text">
        </div>
        <div>
          <label>CEP</label>
          <input type="text">
        </div>
      </div>
    </section>

    <!-- OBSERVAÇÕES E OUTROS BLOCOS PODEM SER ADICIONADOS DA MESMA FORMA -->

  </section>
</div>
</main>

</body>
</html>
