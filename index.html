<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ficha SINAN - Violência Interpessoal / Autoprovocada</title>
<link rel="stylesheet" href="styles.css">
<script defer src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script defer src="app.js"></script>
</head>
<body>
<header class="topbar no-print">
  <div class="topbar-copy">
    <h1>Ficha SINAN editável</h1>
    <p>Preencha online e exporte em PDF pronto para impressão.</p>
  </div>
  <div class="topbar-actions">
    <button id="fillSampleBtn" type="button">Preencher exemplo</button>
    <button id="clearBtn" type="button" class="secondary">Limpar</button>
    <button id="exportBtn" type="button" class="primary">Exportar PDF</button>
  </div>
</header>
<main class="main-wrap">
  <form id="sinanForm">
    <div id="document" class="document">
      <!-- Conteúdo do formulário fiel ao PDF -->
    </div>
  </form>
</main>
</body>
</html>
