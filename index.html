<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ficha SINAN - Violência Interpessoal / Autoprovocada</title>
  <link rel="stylesheet" href="styles.css" />
  <script defer src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <script defer src="app.js"></script>
</head>
<body>
  <!-- Topbar com ações -->
  <header class="topbar no-print">
    <div class="topbar-info">
      <h1>Ficha SINAN editável</h1>
      <p>Modelo web baseado no PDF enviado. Preencha, revise e exporte em PDF.</p>
    </div>
    <div class="topbar-actions">
      <button id="fillSampleBtn" type="button">Preencher exemplo</button>
      <button id="clearBtn" type="button" class="secondary">Limpar</button>
      <button id="exportBtn" type="button" class="primary">Exportar PDF</button>
    </div>
  </header>

  <main>
    <div id="document" class="document">
      <section class="page">
        <!-- Cabeçalho da ficha com logo -->
        <div class="form-header">
          <div class="logo-box">
            <img src="img/logo-prefeitura.png" alt="Logo Prefeitura Nova Serrana" class="logo-orgao">
          </div>
          <div class="header-main">
            <div class="title">FICHA DE NOTIFICAÇÃO INDIVIDUAL</div>
            <div class="subtitle">VIOLÊNCIA INTERPESSOAL / AUTOPROVOCADA</div>
          </div>
          <div class="header-right">
            <strong>SINAN</strong>
            <span>Sistema de Informação de Agravos de Notificação</span>
          </div>
        </div>

        <!-- Coloque aqui todos os campos do formulário já existentes -->
      </section>
    </div>
  </main>
</body>
</html>
