<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fichas Específicas (Investigação)</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      min-height: 100vh;
      background: #f4f6f8;
    }
    .menu-back { padding: 16px 20px 0; }
    .back-btn { display: inline-block; text-decoration: none; background: #374151; color: #fff; padding: 10px 16px; border-radius: 8px; font-weight: 600; }
    .back-btn:hover { background: #1f2937; }
    .placeholder-page {
      min-height: calc(100vh - 60px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .placeholder-card {
      width: 100%;
      max-width: 720px;
      background: #ffffff;
      border-radius: 16px;
      padding: 40px 30px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      text-align: center;
    }
    .home-logo { max-width: 120px; height: auto; margin-bottom: 20px; }
    h1 { margin-bottom: 10px; color: #1f2937; }
    p { margin-bottom: 0; color: #6b7280; }
  </style>
</head>
<body>
  <div class="menu-back">
    <a href="index.html" class="back-btn">← Voltar ao menu</a>
  </div>

  <main class="placeholder-page">
    <div class="placeholder-card">
      <img src="img/logo-prefeitura.png" alt="Logo da Prefeitura" class="home-logo" />
      <h1>Fichas Específicas (Investigação)</h1>
      <p>Essa ficha ainda será adicionada.</p>
    </div>
  </main>
</body>
</html>
