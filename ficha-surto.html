<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ficha de Investigação de Surto</title>
  <link rel="stylesheet" href="styles-surto-novo.css" />
  <script defer src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
  <script defer src="app-surto-novo.js"></script>
</head>
<body>
  <header class="topbar no-print">
    <div>
      <a href="index.html" class="back-link">← Voltar ao menu</a>
      <h1>Ficha de Investigação de Surto</h1>
      <p>Preencha os campos e exporte diretamente no PDF oficial.</p>
    </div>
    <div class="actions">
      <button id="fillSampleBtn" type="button">Preencher exemplo</button>
      <button id="clearBtn" type="button" class="secondary">Limpar</button>
      <button id="toggleGridBtn" type="button" class="secondary">Grade debug: desligada</button>
      <button id="exportBtn" type="button" class="primary">Exportar PDF oficial</button>
    </div>
  </header>

  <main>
    <form id="notificationForm" class="sheet-form">
      <section class="card">
        <h2>Dados Gerais</h2>
        <div class="grid cols-4">
          <div class="field">
            <label>Número</label>
            <input type="text" name="numero_notificacao" />
          </div>
          <div class="field">
            <label>Tipo de Notificação</label>
            <select name="tipo_notificacao">
              <option value=""></option>
              <option>1 - Negativa</option>
              <option>2 - Individual</option>
              <option>3 - Surto</option>
              <option>4 - Inquérito Tracoma</option>
            </select>
          </div>
          <div class="field span-2">
            <label>Agravo/doença</label>
            <input type="text" name="agravo_doenca" />
          </div>

          <div class="field">
            <label>Código CID10</label>
            <input type="text" name="cid10" />
          </div>
          <div class="field">
            <label>Data da Notificação</label>
            <input type="date" name="data_notificacao" />
          </div>
          <div class="field small-field">
            <label>UF</label>
            <input type="text" name="uf_notificacao" maxlength="2" />
          </div>
          <div class="field">
            <label>Município de Notificação</label>
            <input type="text" name="municipio_notificacao" />
          </div>

          <div class="field">
            <label>Código IBGE</label>
            <input type="text" name="ibge_notificacao" />
          </div>
          <div class="field span-2">
            <label>Unidade de Saúde (ou outra fonte notificadora)</label>
            <input type="text" name="unidade_notificadora" />
          </div>
          <div class="field">
            <label>Código da unidade</label>
            <input type="text" name="codigo_unidade" />
          </div>
          <div class="field">
            <label>Data dos 1os sintomas do 1o caso suspeito</label>
            <input type="date" name="data_primeiros_sintomas" />
          </div>
        </div>
      </section>

      <section class="card">
        <h2>Notificação de Surto</h2>
        <div class="grid cols-3">
          <div class="field">
            <label>No de Casos Suspeitos / Expostos até a data da notificação</label>
            <input type="text" name="numero_casos_suspeitos" />
          </div>
          <div class="field span-2">
            <label>Local Inicial de Ocorrência do Surto</label>
            <select name="local_inicial_surto">
              <option value=""></option>
              <option>1 - Residência</option>
              <option>2 - Hospital / Unidade de Saúde</option>
              <option>3 - Creche / Escola</option>
              <option>4 - Asilo</option>
              <option>5 - Outras Instituições (alojamento, trabalho)</option>
              <option>6 - Restaurante / Padaria (similares)</option>
              <option>7 - Eventos</option>
              <option>8 - Casos Dispersos no Bairro</option>
              <option>9 - Casos Dispersos Pelo Município</option>
              <option>10 - Casos Dispersos em mais de um Município</option>
              <option>11 - Outros</option>
            </select>
          </div>
          <div class="field span-3">
            <label>Se marcou 11 - Outros, especificar</label>
            <input type="text" name="local_inicial_surto_outros" />
          </div>
        </div>
      </section>

      <section class="card">
        <h2>Dados de Ocorrência</h2>
        <div class="grid cols-4">
          <div class="field small-field">
            <label>UF</label>
            <input type="text" name="uf_residencia" maxlength="2" />
          </div>
          <div class="field">
            <label>Município de Residência</label>
            <input type="text" name="municipio_residencia" />
          </div>
          <div class="field">
            <label>Código IBGE</label>
            <input type="text" name="ibge_residencia" />
          </div>
          <div class="field">
            <label>Distrito</label>
            <input type="text" name="distrito_residencia" />
          </div>

          <div class="field">
            <label>Bairro</label>
            <input type="text" name="bairro_residencia" />
          </div>
          <div class="field span-2">
            <label>Logradouro</label>
            <input type="text" name="logradouro_residencia" />
          </div>
          <div class="field">
            <label>Código do logradouro</label>
            <input type="text" name="codigo_logradouro" />
          </div>

          <div class="field">
            <label>Número</label>
            <input type="text" name="numero_residencia" />
          </div>
          <div class="field span-2">
            <label>Complemento</label>
            <input type="text" name="complemento_residencia" />
          </div>
          <div class="field">
            <label>Geo campo 1</label>
            <input type="text" name="geo1" />
          </div>

          <div class="field">
            <label>Geo campo 2</label>
            <input type="text" name="geo2" />
          </div>
          <div class="field span-2">
            <label>Ponto de Referência</label>
            <input type="text" name="ponto_referencia" />
          </div>
          <div class="field">
            <label>CEP</label>
            <input type="text" name="cep" />
          </div>

          <div class="field">
            <label>Telefone</label>
            <input type="text" name="telefone" />
          </div>
          <div class="field">
            <label>Zona</label>
            <select name="zona_residencia">
              <option value=""></option>
              <option>1 - Urbana</option>
              <option>2 - Rural</option>
              <option>3 - Periurbana</option>
              <option>9 - Ignorado</option>
            </select>
          </div>
          <div class="field span-2">
            <label>País (se residente fora do Brasil)</label>
            <input type="text" name="pais_residente_fora" />
          </div>
        </div>
      </section>

      <section class="card">
        <h2>Situação Inicial</h2>
        <div class="grid cols-3">
          <div class="field">
            <label>Data da Investigação</label>
            <input type="date" name="data_investigacao" />
          </div>
          <div class="field span-2">
            <label>Modo Provável da Transmissão</label>
            <select name="modo_transmissao">
              <option value=""></option>
              <option>1 - Direta (pessoa a pessoa)</option>
              <option>2 - Indireta (Veículo comum ou Vetor)</option>
              <option>9 - Ignorado</option>
            </select>
          </div>
          <div class="field span-3">
            <label>Se indireta, qual o veículo de transmissão provável</label>
            <select name="veiculo_transmissao">
              <option value=""></option>
              <option>1 - Alimento / Água</option>
              <option>2 - Recursos Hídricos Contaminados</option>
              <option>3 - Vetor</option>
              <option>4 - Produto (medicamentos, agrotóxicos, imunobiológicos, sangue, etc.)</option>
              <option>5 - Fômite (faca, lençóis, agulhas, etc.)</option>
              <option>6 - Outro</option>
              <option>9 - Ignorado</option>
            </select>
          </div>
          <div class="field span-3">
            <label>Se marcou 6 - Outro, especificar</label>
            <input type="text" name="veiculo_transmissao_outro" />
          </div>
        </div>
      </section>

      <section class="card">
        <h2>Observações</h2>
        <div class="field">
          <textarea name="observacoes" rows="10"></textarea>
        </div>
      </section>

      <section class="card">
        <h2>Investigador</h2>
        <div class="grid cols-4">
          <div class="field span-3">
            <label>Município / Unidade de Saúde</label>
            <input type="text" name="investigador_municipio_unidade" />
          </div>
          <div class="field">
            <label>Código da unidade de saúde</label>
            <input type="text" name="investigador_codigo_unidade" />
          </div>
          <div class="field span-2">
            <label>Nome</label>
            <input type="text" name="investigador_nome" />
          </div>
          <div class="field">
            <label>Função</label>
            <input type="text" name="investigador_funcao" />
          </div>
          <div class="field">
            <label>Assinatura</label>
            <input type="text" name="investigador_assinatura" />
          </div>
        </div>
      </section>
    </form>
  </main>
</body>
</html>
