<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Ficha de Surto (Protótipo)</title>
  <link rel="stylesheet" href="styles-surto.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
  <script defer src="app-surto.js"></script>
</head>
<body>

<header class="topbar">
  <h1>Ficha de Surto (Nova Exportação)</h1>
  <div>
    <button onclick="exportPDF()">Exportar PDF</button>
  </div>
</header>

<main>
  <form id="form">
    <label>Agravo/Doença</label>
    <input name="agravo">

    <label>Data Notificação</label>
    <input type="date" name="data">

    <label>Município</label>
    <input name="municipio">

    <label>Nº Casos</label>
    <input name="casos">

    <label>Observações</label>
    <textarea name="obs"></textarea>
  </form>
</main>

</body>
</html>
